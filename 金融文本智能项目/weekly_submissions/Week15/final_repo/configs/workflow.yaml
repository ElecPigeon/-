project_name: "cninfo_bidding_announcements_tracker"
paths:
  metadata: "data/metadata/metadata.csv"
  parsed_docs: "data/parsed/parsed_docs_sample.jsonl"
  results_jsonl: "outputs/results/final_results.jsonl"
  run_log: "outputs/logs/sample_run_log.jsonl"
  eval_report: "outputs/reports/eval_report_final.md"

steps:
  audit:
    enabled: true
  parse:
    enabled: true
  route_sections:
    enabled: true
    rules: "configs/section_rules.yaml"
  extract:
    enabled: true
    prompt: "prompts/prompt_final.md"
  validate:
    enabled: true
  report:
    enabled: true
